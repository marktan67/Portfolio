        { id: "guild-a", rankIndex: 5, title: "Cinder Archon Pursuit", env: "volcanic", targetBoss: "Cinder Archon", bossChance: 0.07, guildXp: 154, heroXp: 190, gold: 200, description: "Track the Cinder Archon across the Molten Peaks." },
        { id: "guild-s", rankIndex: 6, title: "Basalt Colossus Hunt", env: "volcanic", targetBoss: "Basalt Colossus", bossChance: 0.06, guildXp: 196, heroXp: 236, gold: 246, description: "Bring down the Basalt Colossus." },
        { id: "guild-ss", rankIndex: 7, title: "Magma Golem Hunt", env: "volcanic", targetBoss: "Magma Golem", bossChance: 0.05, guildXp: 248, heroXp: 300, gold: 308, description: "The SS contract: hunt the Magma Golem in the volcanic wastes." },
        { id: "guild-sss", rankIndex: 8, title: "Infernal Sovereign Hunt", env: "volcanic", targetBoss: "Infernal Sovereign", bossChance: 0.03, guildXp: 320, heroXp: 380, gold: 400, description: "The final contract: slay the Infernal Sovereign." }
    ];
    const GUILD_XP_THRESHOLDS = GUILD_RANK_XP;

    function getBossChanceForEnv(env) {
        return Object.prototype.hasOwnProperty.call(BOSS_CHANCE_BY_ENV, env) ? BOSS_CHANCE_BY_ENV[env] : 0;
    }

    function getMagicDamageMultiplier() {

        return (hero.magic && hero.magic.capstone === 'ampdamage') ? 2 : 1;
    }


    function getRuneOffenseMultiplier() {
        return hero.runes.includes("fury") ? 1.1 : 1;
    }

    function getRuneDefenseReduction() {
        return hero.runes.includes("warding") ? 0.10 : 0;
    }

    function getRuneManaRegenAmount() {
        return hero.runes.includes("flow") ? Math.max(1, Math.floor(hero.maxMp * 0.10)) : 0;
    }

    function getExpBonusMultiplier() {
        return hero.runes.includes("experience") ? 1.10 : 1;
    }

    function runeDisplayText() {
        if (!hero.runes || hero.runes.length === 0) return "None";
        return hero.runes.map(id => RUNE_DEFS[id]?.name || id).join(", ");
    }

    function applyRuneReward(runeId) {
        if (hero.runes.includes(runeId)) return false;
        hero.runes.push(runeId);

        if (runeId === "strength") hero.stats.str += 10;
        if (runeId === "haste") hero.stats.dex += 10;
        if (runeId === "intelligence") hero.stats.int += 10;
        if (runeId === "charm") hero.stats.cha += 10;
        if (runeId === "mana") { hero.maxMp += 30; hero.mp += 30; }
        if (runeId === "health") { hero.maxHp += 30; hero.hp += 30; }

        hero.hp = Math.min(hero.hp, hero.maxHp);
        hero.mp = Math.min(hero.mp, hero.maxMp);
        return true;
    }

    function awardRandomRuneFromChest() {
        if (Math.random() >= getRuneChestSuccessChance()) return null;
        const pool = Object.keys(RUNE_DEFS).filter(id => !hero.runes.includes(id));
        if (pool.length === 0) return null;
        const runeId = pool[Math.floor(Math.random() * pool.length)];
        applyRuneReward(runeId);
        return runeId;
    }

    // --- STR Skill Tree ---
    function getStrDmgBonusMultiplier() { return hero.stats.str >= 25 ? 1.05 : 1; }
    function getStrDamageReduction() { return hero.stats.str >= 75 ? 0.20 : 0; }
    function isPulverizeUnlocked() { return hero.stats.str >= 50; }
    function getPulverizeMultiplier() { return hero.stats.str >= 100 ? 3 : 2; }

    // --- Class-specific combat math ---
    function getCritChance() {
        const luckBonus = Math.min(6, Math.floor((getLuckScore() - 10) / 3));
        if (hero.classId === 'archer') return 5 + getEffectiveStat('dex') * 1.0 + getWeaponAffixCritBonus() + luckBonus;
        return 5 + getEffectiveStat('dex') * 0.5 + getWeaponAffixCritBonus() + luckBonus * 0.5;
    }
    function getCritMultiplier() { return hero.classId === 'archer' ? 2.0 : 1.5; }
    function getPhysicalWeaponBonus() {
        return (hero.weapon && (hero.weapon.type === 'sword' || hero.weapon.type === 'bow')) ? (hero.weapon.level - 1) * 3 : 0;
    }
    function getMagicWeaponBonus() {
        return (hero.weapon && hero.weapon.type === 'staff') ? (hero.weapon.level - 1) * 3 : 0;
    }
    function getAttackLabel() {
        if (hero.classId === 'swordsman') return '🗡️ Sword Slash';
        if (hero.classId === 'archer') return '🏹 Bow Shot';
        if (hero.classId === 'mage') return '🪄 Staff Strike';
        return 'Physical Strike';
    }

    function getArmorLevel(slot) {
        return Math.max(1, hero.armorSlots?.[slot] || 1);
    }

    function getArmorRating() {
        return Object.keys(ARMOR_SLOT_DATA).reduce((sum, slot) => {
            const data = ARMOR_SLOT_DATA[slot];
            return sum + ((getArmorLevel(slot) - 1) * data.weight);
        }, getArmorAffixRatingBonus());
    }

    function getArmorDamageReductionFlat() {
        return Math.floor(getArmorRating() * 0.55);
    }

    function getArmorDamageReductionPercent() {
        return Math.min(0.36, getArmorRating() * 0.015);
    }

    function getGuildRankLabel() {
        if (!guild.registered) return 'Unregistered';
        return GUILD_RANKS[guild.rankIndex] || 'F';
    }

    function getGuildQuestById(id) {
        return QUEST_DEFS.find(q => q.id === id) || null;
    }

    function getActiveGuildQuest() {
        return guild.activeQuestId ? getGuildQuestById(guild.activeQuestId) : null;
    }

    function getAvailableQuests() {
        const rank = guild.registered ? guild.rankIndex : -1;
        return QUEST_DEFS.filter(q => rank >= q.rankIndex);
    }

    function updateGuildRank() {
        if (!guild.registered) return false;
        let changed = false;
        while (guild.rankIndex < GUILD_RANKS.length - 1 && guild.xp >= GUILD_XP_THRESHOLDS[guild.rankIndex + 1]) {
            guild.rankIndex += 1;
            changed = true;
        }
        return changed;
    }

    function completeActiveGuildQuest(enemyRef) {
        const quest = getActiveGuildQuest();
        if (!quest || !enemyRef || !enemyRef.questBossId) return false;
        if (quest.targetBoss !== enemyRef.questBossId) return false;
        guild.xp += quest.guildXp;
        hero.gold += Math.ceil(quest.gold * getCharismaGoldMultiplier());
        hero.xp += quest.heroXp;
        guild.activeQuestId = null;
        const rankChanged = updateGuildRank();
        addLogMsg(`🏛️ Guild quest complete: ${quest.title}.`, '#f1c40f');
        addLogMsg(`🏅 Guild +${quest.guildXp} XP, +${Math.ceil(quest.gold * getCharismaGoldMultiplier())} Gold, +${quest.heroXp} Hero XP.`, '#2ecc71');
        if (rankChanged) addLogMsg(`✨ Guild Rank increased to ${getGuildRankLabel()}!`, '#8fd1ff');
        return true;
    }

    function createQuestBoss(name, quest) {
        const spec = QUEST_BOSS_LIBRARY[name];
        if (!spec) return null;
        return {
            name: spec.name,
            hp: spec.hp,
            maxHp: spec.hp,
            sprite: spec.sprite,
            xpReward: spec.xp,
            goldReward: spec.gold,
            baseDmg: spec.dmg,
            dieSides: spec.die,
            burn: null,
            polymorphTurns: 0,
            origSprite: null,
            origName: null,
            isBoss: true,
            skills: [...(spec.skills || [])],
            questBossId: quest?.id || null,
            bossTitle: spec.name,
            envTag: spec.env,
            groupSize: 1
        };
    }

    function createGenericBoss(base, env) {
        const bossMultiplier = env === 'volcanic' ? 12 : env === 'crypt' ? 10 : 8;
        const skillPool = env === 'crypt'
            ? ['drain', 'curse', 'soulRend']
            : env === 'volcanic'
                ? ['magmaBurst', 'lavaWave', 'quake', 'emberNova']
                : ['slash', 'command'];
        return {
            name: `👑 Alpha ${base.name}`,
            hp: Math.floor(base.hp * bossMultiplier),
            maxHp: Math.floor(base.hp * bossMultiplier),
            sprite: base.sprite,
            xpReward: Math.floor(base.xp * bossMultiplier),
            goldReward: Math.floor(base.gold * bossMultiplier),
            baseDmg: Math.floor(base.dmg * bossMultiplier),
            dieSides: Math.floor(base.die * bossMultiplier),
            burn: null,
            polymorphTurns: 0,
            origSprite: null,
            origName: null,
            isBoss: true,
            skills: skillPool,
            groupSize: 1
        };
    }

    function createBossSkillLog(skill) {
        const map = {
            slash: 'cleaves with a brutal overhead slash',
            command: 'roars an order that rattles your nerves',
            ambush: 'vanishes into the brush and reappears with a vicious strike',
            drain: 'drains life from the air around you',
            curse: 'hurls a curse through the darkness',

    }

    function shakeEnemy() {
        const eNode = document.getElementById("e-node-spr");
        if (eNode) eNode.classList.add("anim-shake");
    }

    function launchProjectile(type, onImpact) {
        const arena = document.getElementById("battle-arena");
        const pNode = document.getElementById("p-node-spr");
        if (pNode) pNode.classList.add("anim-p-strike");
        if (!arena) { onImpact(); return; }
        const icons = { missile: '✨', fireball: '🔥', shield: '🛡️', polymorph: '🌀' };
        const proj = document.createElement("div");
        proj.className = "spell-projectile";
        proj.innerText = icons[type] || '✨';
        arena.appendChild(proj);
        setTimeout(() => { proj.remove(); onImpact(); }, 450);
    }

    function emojiToTwemojiCode(input) {
        return Array.from(input)
            .map(ch => ch.codePointAt(0).toString(16))
            .join('-');
    }

    function spriteMarkup(emoji, size = 68, extraClass = '') {
        const classes = ['sprite-emoji', extraClass].filter(Boolean).join(' ');
        return `<span class="${classes}" style="display:inline-flex; align-items:center; justify-content:center; width:${size}px; height:${size}px; font-size:${Math.round(size * 0.9)}px; line-height:1; filter:drop-shadow(0 4px 8px rgba(0,0,0,0.55)); user-select:none;">${emoji}</span>`;
    }



    function getMaxStaminaFromStats() {
        return 100 + Math.max(0, getEffectiveStat('sta') - 10) * 5;
    }

    function refreshDerivedVitals(fillStamina = false) {
        hero.maxStamina = getMaxStaminaFromStats();
        hero.stamina = fillStamina ? hero.maxStamina : Math.min(hero.stamina ?? hero.maxStamina, hero.maxStamina);
    }

    function useStamina(cost, reason = 'You are too exhausted to continue.') {
        const spend = Math.max(0, Math.floor(cost));
        if (hero.stamina < spend) {
            alert(reason);
            return false;
        }
        hero.stamina -= spend;
        return true;
    }

    function getCharismaDiscountRate() {
        return Math.min(0.35, Math.max(0, (hero.stats.cha - 10) * 0.015));
    }

    function getCharismaGoldMultiplier() {
        return 1 + Math.min(0.35, Math.max(0, (hero.stats.cha - 10) * 0.0125));
    }

    function getLuckScore() {
        let total = hero.luck || 10;
        if (hero.runes.includes("fury")) total += 1;
        if (hero.runes.includes("warding")) total += 1;
        if (hero.gearAffixes?.weapon?.luck) total += hero.gearAffixes.weapon.luck;
        for (const slot of Object.keys(ARMOR_SLOT_DATA)) {
            if (hero.gearAffixes?.[slot]?.luck) total += hero.gearAffixes[slot].luck;
        }
        return total;
    }

    function getLuckRareChanceBonus() {
        return Math.min(0.12, Math.max(0, (getLuckScore() - 10) * 0.006));
    }

    function getGoldRewardMultiplier() {
        let mult = getCharismaGoldMultiplier() * (1 + Math.min(0.15, Math.max(0, (getLuckScore() - 10) * 0.008)));
        mult *= 1 + getWeaponAffixGoldBonus();
        if (hero.tempGoldBoostTurns > 0) mult *= 1.10;
        return mult;
    }

    function getRuneChestSuccessChance() {
        return Math.min(0.65, 0.35 + getLuckRareChanceBonus());
    }

    function consumeTempGoldBoost() {
        if (hero.tempGoldBoostTurns > 0) hero.tempGoldBoostTurns -= 1;
    }

    function getEffectiveStat(statName) {
        let value = hero.stats[statName] || 10;
        if (hero.injury?.stat === statName) value += hero.injury.penalty;
        return Math.max(1, value);
    }

    function applyInjury(injuryId = null) {
        if (hero.injury) return false;
        const pool = {
            bruise: { name: "Bruised Arm", stat: "str", penalty: -2, hp: -10, mp: 0, sta: -8, text: "A brutal hit leaves your arm bruised and weak." },
            sprain: { name: "Sprained Ankle", stat: "dex", penalty: -2, hp: 0, mp: 0, sta: -14, text: "You twist your ankle badly on the impact." },
            haze: { name: "Battle Haze", stat: "int", penalty: -2, hp: 0, mp: -8, sta: -6, text: "The blow leaves your mind foggy and slow." }
        };
        const injury = pool[injuryId] || pool[["bruise", "sprain", "haze"][Math.floor(Math.random() * 3)]];
        hero.injury = injury;
        hero.stats[injury.stat] += injury.penalty;
        if (injury.hp) { hero.maxHp += injury.hp; hero.hp = Math.max(1, Math.min(hero.hp, hero.maxHp)); }
        if (injury.mp) { hero.maxMp += injury.mp; hero.mp = Math.max(0, Math.min(hero.mp, hero.maxMp)); }
        if (injury.sta) { hero.maxStamina += injury.sta; hero.stamina = Math.max(0, Math.min(hero.stamina, hero.maxStamina)); }
        addLogMsg(`🩸 Injury: ${injury.name}. ${injury.text}`, "#e74c3c");
        return true;
    }

    function healInjury() {
        if (!hero.injury) return false;
        const injury = hero.injury;
        hero.stats[injury.stat] -= injury.penalty;
        if (injury.hp) { hero.maxHp -= injury.hp; hero.hp = Math.min(hero.hp, hero.maxHp); }
        if (injury.mp) { hero.maxMp -= injury.mp; hero.mp = Math.min(hero.mp, hero.maxMp); }
        if (injury.sta) { hero.maxStamina -= injury.sta; hero.stamina = Math.min(hero.stamina, hero.maxStamina); }
        hero.injury = null;
        return true;
    }

    function getInjuryLabel() {
        return hero.injury ? hero.injury.name : "None";
    }

    function registerBestiaryEncounter(encounter, defeated = false) {
        if (!encounter || !encounter.name) return;
        if (!hero.bestiary[encounter.name]) {
            hero.bestiary[encounter.name] = {
                seen: 0,
                defeated: 0,
                elite: !!encounter.isElite,
                boss: !!encounter.isBoss,
                env: encounter.envTag || currentEnv
            };
        }
        hero.bestiary[encounter.name].seen += 1;
        if (defeated) hero.bestiary[encounter.name].defeated += 1;
        if (encounter.isBoss) hero.bestiary[encounter.name].boss = true;
        if (encounter.isElite) hero.bestiary[encounter.name].elite = true;
    }

    function getBestiaryEntries() {
        return Object.entries(hero.bestiary || {})
            .map(([name, data]) => ({ name, ...data }))
            .sort((a, b) => (b.defeated + b.seen) - (a.defeated + a.seen));
    }

    function getEliteChance(env) {
        const base = env === 'volcanic' ? 0.12 : env === 'crypt' ? 0.10 : 0.08;
        return Math.min(0.22, base + getLuckRareChanceBonus());
    }

    function createEliteMonster(base, env) {
        const eliteMultiplier = env === 'volcanic' ? 2.3 : env === 'crypt' ? 2.1 : 1.9;
        const skillPool = env === 'crypt'
            ? ['drain', 'curse']
            : env === 'volcanic'
                ? ['magmaBurst', 'emberNova']
                : ['command', 'ambush'];
        return {
            name: `★ Elite ${base.name}`,
            hp: Math.floor(base.hp * eliteMultiplier),
            maxHp: Math.floor(base.hp * eliteMultiplier),
            sprite: base.sprite,
            xpReward: Math.floor(base.xp * eliteMultiplier * 1.2),
            goldReward: Math.floor(base.gold * eliteMultiplier * 1.2),
            baseDmg: Math.floor(base.dmg * (eliteMultiplier * 0.9)),
            dieSides: Math.floor(base.die + 2),
            burn: null,
            polymorphTurns: 0,
            origSprite: null,
            origName: null,
            isBoss: false,
            isElite: true,
            skills: skillPool,
            groupSize: 1,
            phase: 1,
            phaseMarks: { 2: false, 3: false, 4: false }
        };
    }

    function maybeTriggerEnemyPhases() {
        if (!enemy || !enemy.isBoss || !enemy.maxHp) return;
        if (!enemy.phaseMarks) enemy.phaseMarks = { 2: false, 3: false, 4: false };
        const thresholds = [
            { phase: 2, ratio: 0.70, name: 'Second Phase', buffDmg: 1, buffDice: 1, skill: 'rage' },
            { phase: 3, ratio: 0.40, name: 'Third Phase', buffDmg: 2, buffDice: 1, skill: 'sunder' },
            { phase: 4, ratio: 0.15, name: 'Final Phase', buffDmg: 3, buffDice: 2, skill: 'infernoCrown' }
        ];
        for (const phase of thresholds) {
            if (!enemy.phaseMarks[phase.phase] && enemy.hp > 0 && enemy.hp <= enemy.maxHp * phase.ratio) {
                enemy.phaseMarks[phase.phase] = true;
                enemy.phase = phase.phase;
                enemy.baseDmg += phase.buffDmg;
                enemy.dieSides += phase.buffDice;
                enemy.skills = Array.from(new Set([...(enemy.skills || []), phase.skill]));
                addLogMsg(`👑 ${enemy.name} enters ${phase.name}! Its attacks grow fiercer.`, "#f1c40f");
                break;
            }
        }
    }

    function maybeRollGearAffix(slot, upgradeLevel) {
        if (!hero.gearAffixes) hero.gearAffixes = { weapon: null, helmet: null, armor: null, gloves: null, pants: null, legs: null };
        if (slot === 'weapon' && hero.gearAffixes.weapon) return null;
        if (slot !== 'weapon' && hero.gearAffixes[slot]) return null;
        if (upgradeLevel < 3 && Math.random() > 0.25) return null;
        const weaponPool = [
            { id: 'keen', name: 'Keen', desc: '+5 crit chance', crit: 5 },
            { id: 'brutal', name: 'Brutal', desc: '+4 physical damage', dmg: 4 },
            { id: 'arcane', name: 'Arcane', desc: '+4 magic damage', magic: 4 },
            { id: 'greedy', name: 'Greedy', desc: '+10% gold on kill', gold: 10 }
        ];
        const armorPool = [
            { id: 'fortified', name: 'Fortified', desc: '+2 armor', armor: 2 },
            { id: 'vigilant', name: 'Vigilant', desc: '+2 luck', luck: 2 },
            { id: 'hardy', name: 'Hardy', desc: '+12 max HP', hp: 12 },
            { id: 'swift', name: 'Swift', desc: '+1 DEX', dex: 1 }
        ];
        const pool = slot === 'weapon' ? weaponPool : armorPool;
        const affix = { ...pool[Math.floor(Math.random() * pool.length)] };
        hero.gearAffixes[slot] = affix;
        if (affix.hp) { hero.maxHp += affix.hp; hero.hp += affix.hp; }
        if (affix.dex) { hero.stats.dex += affix.dex; }
        if (affix.luck) { hero.luck += affix.luck; }
        if (slot === 'weapon' && affix.magic) { hero.maxMp += 6; hero.mp += 6; }
        return affix;
    }

    function describeAffix(slot) {
        const affix = hero.gearAffixes?.[slot];
        if (!affix) return 'None';
        return affix.name;
    }

    function getWeaponAffixDamageBonus() {
        const affix = hero.gearAffixes?.weapon;
        return affix?.dmg || 0;
    }

    function getWeaponAffixCritBonus() {
        const affix = hero.gearAffixes?.weapon;
        return affix?.crit || 0;
    }

    function getWeaponAffixMagicBonus() {
        const affix = hero.gearAffixes?.weapon;
        return affix?.magic || 0;
    }

    function getWeaponAffixGoldBonus() {
        const affix = hero.gearAffixes?.weapon;
        return affix?.gold ? affix.gold / 100 : 0;
    }

    function getArmorAffixRatingBonus() {
        return Object.keys(ARMOR_SLOT_DATA).reduce((sum, slot) => sum + (hero.gearAffixes?.[slot]?.armor || 0), 0);
    }

    function getArmorAffixLuckBonus() {
        return Object.keys(ARMOR_SLOT_DATA).reduce((sum, slot) => sum + (hero.gearAffixes?.[slot]?.luck || 0), 0);
    }

    function getExtraBossLootMultiplier() {
        return 1 + Math.min(0.15, getLuckRareChanceBonus());
    }

    function getHiddenDungeonChance() {
        return 0.015 + getLuckRareChanceBonus();
    }

    function getArenaTitle() {
        return arenaRun ? `Trial Wave ${arenaRun.wave + 1}/3` : 'Arena Trial';
    }

    function isGroupEncounter() {
        return Array.isArray(enemy.groupMembers) && enemy.groupMembers.length > 0;
    }

    function syncEnemyEncounterTotals() {
        if (!isGroupEncounter()) return;
        enemy.groupMembers.forEach(m => {
            if (m.hp < 0) m.hp = 0;
            if (m.hp > m.maxHp) m.hp = m.maxHp;
        });
        enemy.hp = enemy.groupMembers.reduce((sum, m) => sum + Math.max(0, m.hp), 0);
        enemy.maxHp = enemy.groupMembers.reduce((sum, m) => sum + Math.max(0, m.maxHp), 0);
    }

    function applyDamageToEnemy(dmg) {
        const amount = Math.max(0, Math.floor(dmg));
        if (!isGroupEncounter()) {
            enemy.hp = Math.max(0, enemy.hp - amount);
            return amount;
        }
        let remaining = amount;
        for (const member of enemy.groupMembers) {
            if (remaining <= 0) break;
            if (member.hp <= 0) continue;
            const taken = Math.min(member.hp, remaining);
            member.hp -= taken;
            remaining -= taken;
        }
        syncEnemyEncounterTotals();
        return amount;
    }

    function renderEnemyCombatHtml() {
        if (!isGroupEncounter()) {
            return spriteMarkup(enemy.sprite, enemy.isBoss ? 118 : 92, "enemy-combat");
        }
        return `
            <div style="display:flex; gap:8px; justify-content:center; align-items:flex-end; flex-wrap:wrap; max-width:220px; padding:4px 0;">
                ${enemy.groupMembers.map((member, idx) => `
                    <div style="display:flex; flex-direction:column; align-items:center; width:68px; opacity:${member.hp > 0 ? '1' : '0.35'};">
                        <div style="font-size:0.72rem; color:#dbe7ff; margin-bottom:2px;">${idx + 1}</div>
                        <div>${spriteMarkup(member.sprite, 58, 'enemy-combat')}</div>
                        <div style="width:58px; font-size:0.62rem; color:#dbe7ff; margin-top:2px;">${member.hp}/${member.maxHp}</div>
                        <div class="glow-bar-bg" style="height:10px; border-radius:6px; margin-top:2px;"><div class="glow-bar-fill" style="width:${(member.hp / member.maxHp) * 100}%; background:linear-gradient(90deg, #e53935, #ff7373);"></div></div>
                    </div>
                `).join('')}
            </div>`;
    }

    function getAreaTitle(env) {
        if (env === "grasslands") return "Whispering Grasslands";
        if (env === "crypt") return "Forgotten Crypt";
        if (env === "volcanic") return "Molten Peaks";
        if (env === "dungeon") return "Ember Dungeon";
        if (env === "arena") return "Arena Trial";
        return "Town Courtyard";
    }

    function startTransition(nextAction, message = 'Moving onward...') {
        view.style.transition = 'none';
        view.style.opacity = '1';
        view.className = 'env-town';
        view.innerHTML = `
            <div id="transition-overlay" style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:linear-gradient(180deg, rgba(9, 18, 48, 0.92), rgba(4, 9, 24, 0.84)); opacity:0; transition:opacity 0.75s ease; z-index:5; pointer-events:none;">
                <div class="rpg-panel isekai-panel" style="padding:28px; width:100%; max-width:520px; text-align:center; opacity:0; transition:opacity 0.65s ease;">
                    <div style="font-size:3rem; margin-bottom:10px;">✦</div>
                    <h2 style="color:#dbe7ff; margin:0 0 8px 0;">${message}</h2>
                    <p style="color:#9fb3d7; margin:0;">The world fades and the next scene gathers around you.</p>
                </div>
            </div>
        `;
        const overlay = document.getElementById('transition-overlay');
        const panel = overlay ? overlay.firstElementChild : null;
        requestAnimationFrame(() => {
            if (overlay) overlay.style.opacity = '1';
            if (panel) panel.style.opacity = '1';
        });
        setTimeout(() => {
            if (panel) panel.style.opacity = '0';
            if (overlay) overlay.style.opacity = '0';
        }, 900);
        setTimeout(() => {
            if (typeof nextAction === 'function') nextAction();
            requestAnimationFrame(() => {
                view.style.opacity = '1';
            });
        }, 1500);
    }

    function getJourneyEventPool(env, kind) {
        if (kind === "town") {
            return [
                { type: "narrative", text: "We keep to the road and watch the tree line for anything moving." },
                { type: "check", text: "A blockade of soldiers inspects travelers ahead. We try to slip past without drawing attention.", stat: "dex", dc: 13, damage: 5, successText: "We move like shadows and pass the checkpoint unseen.", failText: "A guard shoulder-checks us hard enough to hurt." },
                { type: "loot", text: "A loose pouch of coins lies in the mud by the roadside.", goldMin: 8, goldMax: 18, successText: "We pocket the stray coin purse and keep moving." },
                { type: "ambush", text: "A small gang leaps from behind a wagon and cuts off the path home.", name: "Road Bandits", sprite: "🥷", hp: 18, xp: 18, gold: 14, dmg: 3, die: 5, groupSize: 2 },
            ];
        }

        if (env === "crypt") {
            return [
                { type: "narrative", text: "Cold stone and stale air press in from every side as we move deeper." },
                { type: "check", text: "A cracked stairwell collapses ahead. We try to cross before it gives way.", stat: "dex", dc: 14, damage: 7, successText: "We catch the edge and slide across safely.", failText: "The stone snaps under our feet and we slam into the floor." },
                { type: "loot", text: "A forgotten satchel rests beside a broken altar.", goldMin: 12, goldMax: 24, successText: "We snatch the satchel and find a few useful coins." },
                { type: "ambush", text: "Three restless dead rise at once and lunge from the shadows.", name: "Skeleton Trio", sprite: "💀", hp: 24, xp: 24, gold: 20, dmg: 4, die: 6, groupSize: 3 },
            ];
        }

        if (env === "volcanic") {
            return [
                { type: "narrative", text: "Ash drifts across the trail and stings our eyes as we push forward." },
                { type: "check", text: "A river of lava blocks the route. We time the crossing between bursts of heat.", stat: "dex", dc: 15, damage: 8, successText: "We dash across before the heat catches us.", failText: "The ground gives way and the heat scorches us hard." },
                { type: "loot", text: "A scorched pouch lies half-buried in cinders.", goldMin: 14, goldMax: 28, successText: "We pry open the pouch and claim what survived the fire." },
                { type: "ambush", text: "A fire-forged raiding party emerges from the haze and circles us.", name: "Ember Raiders", sprite: "🔥", hp: 30, xp: 30, gold: 26, dmg: 5, die: 7, groupSize: 3 },
            ];
        }

        if (env === "dungeon") {
            return [
                { type: "narrative", text: "The corridor groans around us and every step sounds too loud." },
                { type: "check", text: "A slab floor drops away ahead. We jump the gap before it swallows us.", stat: "dex", dc: 14, damage: 7, successText: "We clear the gap without losing our footing.", failText: "We catch the edge badly and scrape ourselves on the fall." },
                { type: "loot", text: "A cracked chest lid reveals a few coins and dust.", goldMin: 10, goldMax: 20, successText: "We grab the scattered coins before the dark swallows them." },
                { type: "ambush", text: "A trio of dungeon wardens rushes in and tries to pin us in place.", name: "Dungeon Wardens", sprite: "🛡️", hp: 28, xp: 28, gold: 24, dmg: 5, die: 6, groupSize: 3 },
            ];
        }

        return [
            { type: "narrative", text: "Moving slowly and dodging branches as we go." },
            { type: "check", text: "Encountered a river. We try to cross.", stat: "dex", dc: 12, damage: 6, successText: "We cross without losing our footing.", failText: "The current yanks our legs and we take a hard spill." },
            { type: "loot", text: "We spot a pouch of coins lying on the ground.", goldMin: 8, goldMax: 16, successText: "We pocket the pouch before anyone notices." },
            { type: "ambush", text: "A bandit trio bursts from the brush and surrounds us.", name: "Bandit Trio", sprite: "🥷", hp: 22, xp: 22, gold: 18, dmg: 4, die: 6, groupSize: 3 },
            { type: "ambush", text: "A soldier blockade stops the path ahead and reaches for their blades.", name: "Soldier Patrol", sprite: "🛡️", hp: 24, xp: 24, gold: 20, dmg: 4, die: 6, groupSize: 3 },
        ];
    }

    function pickJourneyEvent(env, kind) {
        if (kind !== 'dungeon' && Math.random() < getHiddenDungeonChance()) {
            return { type: 'hiddenDungeon', text: 'The path opens onto a sealed archway veiled by moss and old magic.', successText: 'A hidden vault reveals itself from the mist.' };
        }
        const pool = getJourneyEventPool(env, kind);
        return pool[Math.floor(Math.random() * pool.length)];
    }

    function getJourneyEncounterChance(destination) {
        const kind = destination?.kind || "hunt";
        const env = destination?.env || "town";
        if (kind === "town") return 0.12;
        if (env === "grasslands") return 0.22;
        if (env === "crypt") return 0.26;
        if (env === "volcanic") return 0.30;
        if (env === "dungeon") return 0.18;
        return 0.22;
    }

    function rollJourneyDie(sides = 20) {
        return Math.floor(Math.random() * sides) + 1;
    }

    function getStatModifier(statName) {
        return Math.floor(((hero.stats[statName] || 10) - 10) / 2);
    }

    function createAmbushEncounter(event, destination) {
        const groupSize = event.groupSize || 3;
        const baseGold = event.gold || 15;
        const baseXp = event.xp || 18;
        const baseDmg = event.dmg || 3;
        const baseDie = event.die || 6;
        const members = Array.from({ length: groupSize }, (_, idx) => ({
            name: `${event.name || 'Ambusher'} ${idx + 1}`,
            sprite: event.sprite || '🥷',
            maxHp: Math.ceil((event.hp || 20) * (0.85 + idx * 0.08)),
            hp: Math.ceil((event.hp || 20) * (0.85 + idx * 0.08)),
            baseDmg: Math.ceil(baseDmg * (0.85 + idx * 0.12)),
            dieSides: Math.ceil(baseDie + idx + 1)
        }));
        const totalHp = members.reduce((sum, m) => sum + m.hp, 0);
        return {
            name: `${event.name || 'Ambush'} x${groupSize}`,
            hp: totalHp,
            maxHp: members.reduce((sum, m) => sum + m.maxHp, 0),
            sprite: event.sprite || '🥷',
            xpReward: Math.ceil(baseXp * groupSize * 1.15),
            goldReward: Math.ceil(baseGold * groupSize * 1.10),
            baseDmg: Math.ceil(baseDmg * 1.1),
            dieSides: Math.ceil(baseDie + groupSize),
            burn: null,
            polymorphTurns: 0,
            origSprite: null,
            origName: null,
            isBoss: false,
            groupSize,
            groupMembers: members,
            travelArrival: destination.onArrival,
            travelArrivalLabel: destination.label
        };
    }

    function renderJourneyScene(destination, event) {
        view.className = `env-${destination.env || "town"}`;
        const title = destination.kind === "town" ? "The Road Home" : `Journey to ${destination.label}`;
        const modeText = event.type === "ambush" ? "An encounter blocks the path." : event.type === "check" ? "A quick check stands between us and the next step." : "The road is quiet for the moment.";
        const travelBody = event.type === "check"
            ? `
                <div style="background: rgba(12,24,58,0.58); padding: 14px; border-radius: 14px; border: 1px solid rgba(160,185,255,0.2); margin: 14px 0 18px 0;">
                    <div style="font-size: 2.8rem; margin-bottom: 8px;">🎲</div>
                    <div id="journey-die" style="font-size: 3rem; font-weight: bold; color: #f1c40f; margin-bottom: 8px;">?</div>
                    <div style="color:#bbb; margin-bottom:6px;">${event.stat.toUpperCase()} Check — DC ${event.dc}</div>
                    <div style="color:#888; font-size:0.85rem;">${event.text}</div>
                </div>
            `
            : event.type === "loot"
                ? `<div style="font-size:3rem; margin: 10px 0 6px 0;">🪙</div><div style="color:#ddd; margin-bottom:6px;">${event.text}</div>`
                : event.type === "ambush"
                    ? `<div style="font-size:3rem; margin: 10px 0 6px 0;">⚔️</div><div style="color:#ddd; margin-bottom:6px;">${event.text}</div><div style="color:#f1c40f; font-size:0.9rem; margin-bottom:10px;">${event.name} (${event.groupSize || 3} enemies)</div>`
                    : event.type === 'hiddenDungeon'
                        ? `<div style="font-size:3rem; margin: 10px 0 6px 0;">🗝️</div><div style="color:#ddd; margin-bottom:6px;">${event.text}</div>`
                        : `<div style="font-size:3rem; margin: 10px 0 6px 0;">🌲</div><div style="color:#ddd; margin-bottom:6px;">${event.text}</div>`;

        view.innerHTML = `
            <div class="rpg-panel isekai-panel" style="padding: 24px; width: 100%; max-width: 580px; text-align: center;">
                <div class="isekai-tag">🧭 Travel Event</div>
                <h1 style="color:#dbe7ff; margin:0 0 8px 0;">${title}</h1>
                <p style="color:#bbb; margin:0 0 12px 0;">${modeText}</p>
                ${renderStatPanel()}
                ${travelBody}
                <div id="journey-result" style="min-height: 28px; margin-bottom: 12px; color:#ddd;"></div>
                <div style="display:flex; justify-content:center; gap:10px; flex-wrap:wrap;">
                    ${event.type === "check" ? '<button id="btn-journey-roll" class="rpg-btn" style="background:linear-gradient(180deg,#2980b9,#1f618d);">Roll DEX Check</button>' : ''}
                    ${event.type === "ambush" ? '<button id="btn-journey-ambush" class="rpg-btn" style="background:linear-gradient(180deg,#c0392b,#962d22);">Draw Weapons</button>' : ''}
                    ${event.type !== "ambush" ? '<button id="btn-journey-next" class="rpg-btn" style="display:' + (event.type === "check" ? 'none' : 'inline-flex') + '; background:linear-gradient(180deg,#27ae60,#1e7e43);">Next</button>' : ''}
                </div>
            </div>
        `;

        const nextBtn = document.getElementById("btn-journey-next");

        if (event.type === "check") {
            const rollBtn = document.getElementById("btn-journey-roll");
            const resultBox = document.getElementById("journey-result");
            const dieBox = document.getElementById("journey-die");
            rollBtn.onclick = () => {
                rollBtn.disabled = true;
                resultBox.textContent = "Rolling...";
                let ticks = 0;
                const finalRoll = rollJourneyDie(20);
                const anim = setInterval(() => {
                    ticks += 1;
                    if (dieBox) dieBox.textContent = String(rollJourneyDie(20));
                    if (ticks >= 12) {
                        clearInterval(anim);
                        const mod = getStatModifier(event.stat);
                        const total = finalRoll + mod;
                        const success = total >= event.dc;
                        if (dieBox) dieBox.textContent = String(finalRoll);
                        if (success) {
                            resultBox.innerHTML = `<span style="color:#2ecc71;">${event.successText || "We make the crossing safely."}</span> <span style="color:#f1c40f;">(Rolled ${finalRoll} + ${mod} = ${total})</span>`;
                        } else {
                            const dmg = Math.max(1, Math.floor((event.damage || 6) + (event.dc - total)));
                            hero.hp = Math.max(0, hero.hp - dmg);
                            resultBox.innerHTML = `<span style="color:#e74c3c;">${event.failText || "We lose our footing and get hurt."}</span> <span style="color:#f1c40f;">(Rolled ${finalRoll} + ${mod} = ${total})</span> <span style="color:#ffb36b;">-${dmg} HP</span>`;
                            renderStatPanel();
                            if (hero.hp <= 0) {
                                setTimeout(() => resolveMatch(false), 550);
                                return;
                            }
                        }
                        if (nextBtn) nextBtn.style.display = 'inline-flex';
                        nextBtn.textContent = 'Next';
                        nextBtn.onclick = () => startTransition(() => finishJourney(destination), 'Moving onward...');
                    }
                }, 55);
            };
        }

        if (event.type === "loot") {
            if (nextBtn) nextBtn.onclick = () => {
                const goldGain = Math.floor(event.goldMin + Math.random() * ((event.goldMax - event.goldMin) + 1));
                hero.gold += goldGain;
                const resultBox = document.getElementById("journey-result");
                resultBox.innerHTML = `${event.successText || "We claim the loot."} <span style="color:#f1c40f;">+${goldGain} Gold</span>`;
                startTransition(() => finishJourney(destination), 'Moving onward...');
            };
        }

        if (event.type === "narrative") {
            if (nextBtn) nextBtn.onclick = () => startTransition(() => finishJourney(destination), 'Moving onward...');
        }

        if (event.type === "ambush") {
            document.getElementById("btn-journey-ambush").onclick = () => {
                forcedEncounter = createAmbushEncounter(event, destination);
                currentEnv = destination.env || currentEnv;
                enterCombatState();
            };
        }

        if (event.type === 'hiddenDungeon') {
            const nextBtn = document.getElementById('btn-journey-next');
            if (nextBtn) {
                nextBtn.style.display = 'inline-flex';
                nextBtn.onclick = () => {
                    hiddenDungeonUnlocked = true;
                    startTransition(() => startDungeonRun('Ancient Vault'), 'The hidden vault awakens...');
                };
            }
        }
    }

    function finishJourney(destination) {
        travelJourney = null;
        if (destination && typeof destination.onArrival === "function") {
            destination.onArrival();
        }
    }

    function beginJourney(destination) {
        const journeyDestination = {
            kind: destination.kind || "travel",
            env: destination.env || "town",
            label: destination.label || getAreaTitle(destination.env || "town"),
            onArrival: destination.onArrival || (() => openTownHub())
        };
        const travelCost = journeyDestination.kind === 'search' ? 10 : 5;
        if (!useStamina(travelCost, 'You need more stamina before you can continue traveling.')) { openTownHub(); return false; }
        travelJourney = journeyDestination;

        const encounterChance = getJourneyEncounterChance(journeyDestination);
        const encounterRoll = Math.random();

        const renderEvent = () => {
            if (encounterRoll < encounterChance) {
                const event = pickJourneyEvent(journeyDestination.env, journeyDestination.kind);
                renderJourneyScene(journeyDestination, event);
            } else {
                const calmTexts = [
                    "The road stays quiet and the wind slips through the trees.",
                    "We move carefully, keeping our eyes on the path ahead.",
                    "Branches creak overhead as we travel in silence.",
                    "Nothing blocks the way, only the sound of distant birds and shifting leaves."
                ];
                renderJourneyScene(journeyDestination, {
                    type: "narrative",
                    text: calmTexts[Math.floor(Math.random() * calmTexts.length)]
                });
            }
        };

        renderEvent();
        return true;
    }
    // ==========================================
    // 2. CHARACTER DESIGN ARCHITECTURE (VIEWS)
    // ==========================================
    function openCharacterCreation() {
        view.style.opacity = '1';
        let selectedRace = "Human";
        let selectedClass = "swordsman";
        let pointsLeft = 10;
        let tStats = { str: 10, dex: 10, int: 10, sta: 10, cha: 10 };

        function drawCreationScreen() {
            view.className = "env-town";
            view.innerHTML = `
                <div class="rpg-panel isekai-panel" style="padding: 26px; width: 100%; max-width: 860px; text-align: center;">
                    <div class="isekai-tag">✦ Isekai Summoning Circle ✦</div>
                    <h1 style="color: #dbe7ff; margin: 0 0 6px 0; text-shadow: 0 2px 14px rgba(79,120,255,0.55);">Awaken in Another World</h1>
                    <p style="color: #a9bddf; margin-bottom: 22px; font-size: 0.95rem;">Choose your origin, your calling, and the shape of your new life.</p>
                    
                    <div class="isekai-grid">
                        <div class="isekai-box" style="display: flex; flex-direction: column; gap: 12px;">
                            <div>
                                <label style="font-weight:bold; color:#cfe0ff;">Race</label>
                                <select id="sel-race" class="isekai-select">
                                    ${Object.keys(RACES).map(r => `<option value="${r}" ${r===selectedRace?'selected':''}>${r} (${RACES[r].sprite})</option>`).join("")}
                                </select>
                                <div id="race-bonus" class="isekai-text" style="margin-top:6px;">${RACES[selectedRace].bonus}</div>
                            </div>
                            <div>
                                <label style="font-weight:bold; color:#cfe0ff;">Class</label>
                                <select id="sel-class" class="isekai-select">
                                    ${Object.keys(CLASSES).map(c => `<option value="${c}" ${c===selectedClass?'selected':''}>${CLASSES[c].name}</option>`).join("")}
                                </select>
                                <div class="isekai-text" style="margin-top:6px;">${CLASSES[selectedClass].desc}</div>
                            </div>
                        </div>

                        <div class="isekai-box">
                            <div style="display:flex; justify-content:space-between; font-weight:bold; border-bottom:1px solid rgba(140,180,255,0.18); padding-bottom:6px; margin-bottom:10px;">
                                <span style="color:#dbe7ff;">Attributes</span>
                                <span style="color:#8fd1ff;">Points Remaining: ${pointsLeft}</span>
                            </div>
                            ${["str", "dex", "int", "sta", "cha"].map(s => `
                                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; font-size:0.95rem;">
                                    <span style="text-transform: uppercase; font-weight:bold; color:#b8c7e6;">${s}: <span id="val-${s}" style="color:#fff;">${tStats[s]}</span></span>
                                    <div style="display:flex; gap:6px;">
                                        <div class="stat-dot" data-stat="${s}" data-dir="minus">-</div>
                                        <div class="stat-dot" data-stat="${s}" data-dir="plus">+</div>
                                    </div>
                                </div>
                            `).join("")}
                        </div>
                    </div>

                    <button id="btn-finalize" class="rpg-btn" style="background: linear-gradient(180deg, #5f7cff, #273a7d); padding: 12px 40px; font-size: 1.05rem; width:100%; border-color: rgba(163,192,255,0.4);">Awaken Hero</button>
                </div>
            `;

            document.getElementById("sel-race").onchange = (e) => { selectedRace = e.target.value; drawCreationScreen(); };
            document.getElementById("sel-class").onchange = (e) => { selectedClass = e.target.value; drawCreationScreen(); };

            document.querySelectorAll(".stat-dot").forEach(dot => {
                dot.onclick = () => {
                    let stat = dot.getAttribute("data-stat");
                    let dir = dot.getAttribute("data-dir");
                    if (dir === "plus" && pointsLeft > 0) { tStats[stat]++; pointsLeft--; }
                    else if (dir === "minus" && tStats[stat] > 10) { tStats[stat]--; pointsLeft++; }
                    drawCreationScreen();
                };
            });

            document.getElementById("btn-finalize").onclick = () => {
                let raceConfig = RACES[selectedRace];
                let classConfig = CLASSES[selectedClass];

                hero.race = selectedRace;
                hero.classId = selectedClass;
                hero.className = classConfig.name;
                hero.sprite = classConfig.icon || raceConfig.sprite;
                hero.stats = { ...tStats };

                if(selectedRace === "Human") { Object.keys(hero.stats).forEach(k => hero.stats[k]+=1); }
                else if(selectedRace === "Elf") { hero.stats.int += 2; hero.stats.dex += 1; }
                else if(selectedRace === "Dwarf") { hero.stats.sta += 2; hero.stats.str += 1; }
                else if(selectedRace === "Beastmen") { hero.stats.str += 2; hero.stats.cha += 1; }

                hero.maxHp = classConfig.baseHp + (hero.stats.sta * 2);
                hero.maxMp = classConfig.baseMp + (hero.stats.int * 1.5);
                refreshDerivedVitals(true);
                hero.hp = hero.maxHp;
                hero.mp = hero.maxMp;
                hero.spells = classConfig.spell ? [classConfig.spell] : [];
                hero.weapon = { type: classConfig.weapon, level: 1 };
                hero.pulverizeCooldown = 0;
                hero.strMilestonesSeen = [];
                hero.runes = [];
                hero.burnTurns = 0; hero.burnDamage = 0;
                hero.armorSlots = { helmet: 1, armor: 1, gloves: 1, pants: 1, legs: 1 };
                refreshDerivedVitals(true);

                // Fresh magic/shield state for a new hero
                hero.shieldTurns = 0; hero.shieldReduction = 0;
                hero.magic = { multiMissile: false, ignite: false, upgradeChoice: null, capstone: null, milestonesSeen: [] };
                hero.luck = 10;
                hero.tempGoldBoostTurns = 0;
                hero.injury = null;
                hero.bestiary = {};
                hero.gearAffixes = { weapon: null, helmet: null, armor: null, gloves: null, pants: null, legs: null };

                guild = { registered: false, xp: 0, rankIndex: 0, activeQuestId: null, completedQuestIds: [] };
                dungeonRun = null;
                arenaRun = null;
                hiddenDungeonUnlocked = false;
                travelJourney = null;
                forcedEncounter = null;
                currentEnv = "town";
                openTownHub();
            };
        }
        drawCreationScreen();
    }

    function renderStatPanel() {
        return `
            <div class="rpg-panel" style="width: 100%; max-width: 650px; padding: 12px 20px; box-sizing: border-box; display: flex; flex-wrap: wrap; gap: 15px; justify-content: space-between; font-size: 0.9rem; margin-bottom: 20px; background: linear-gradient(180deg, rgba(11, 22, 54, 0.94), rgba(5, 10, 24, 0.88));">
                <div style="display:flex; align-items:center; gap:10px;">${spriteMarkup(hero.sprite, 44, "hero-avatar")}<b>${hero.className}</b> (Lv.${hero.level} ${hero.race})</div>
                <div style="display:flex; gap:10px; flex-wrap:wrap;">
                    <span>STR:${hero.stats.str}</span>|<span>DEX:${hero.stats.dex}</span>|<span>INT:${hero.stats.int}</span>|<span>LCK:${getLuckScore()}</span>
                </div>
                <div>🪙 <span style="color:#f1c40f; font-weight:bold;">${hero.gold}</span></div>
                <div style="width:100%; display:flex; gap:12px; flex-wrap:wrap; color:#c9b37f; font-size:0.8rem; line-height:1.4;">

                    <span>Armor: ${Math.round(getArmorRating())}</span>
                    <span>Injury: ${getInjuryLabel()}</span>

    function openAlchemistView() {
        view.style.opacity = '1';
        const discountRate = getCharismaDiscountRate();
        const goods = [
            { id: "salve", name: "Cleansing Salve", cost: 42, desc: "Removes your current injury." , effect: () => { healInjury(); } },
            { id: "luck_charm", name: "Lucky Charm", cost: 78, desc: "+2 Luck permanently.", effect: () => { hero.luck += 2; } },
            { id: "stout_mead", name: "Stout Mead", cost: 36, desc: "Restores 40 stamina.", effect: () => { hero.stamina = Math.min(hero.maxStamina, hero.stamina + 40); } },
            { id: "iron_tonic", name: "Iron Tonic", cost: 52, desc: "Restores 30 HP and 15 MP.", effect: () => { hero.hp = Math.min(hero.maxHp, hero.hp + 30); hero.mp = Math.min(hero.maxMp, hero.mp + 15); } }
        ].map(item => ({ ...item, cost: Math.max(10, Math.ceil(item.cost * (1 - discountRate))) }));
        let htmlItems = goods.map((item, idx) => `
            <div class="isekai-box" style="text-align:left;">
                <div style="display:flex; justify-content:space-between; gap:12px; align-items:center;">
                    <div>
                        <div style="color:#dbe7ff; font-weight:bold;">${item.name}</div>
                        <div class="isekai-text">${item.desc}</div>
                        <div class="isekai-text">Cost: ${item.cost} Gold</div>
                    </div>
                    <button id="alchemy-buy-${idx}" class="rpg-btn" style="background:linear-gradient(180deg,#1abc9c,#117a65);" ${hero.gold < item.cost ? 'disabled' : ''}>Buy</button>
                </div>
            </div>
        `).join('');
        view.className = "env-town";
        view.innerHTML = `
            <div class="rpg-panel isekai-panel" style="padding:24px; width:100%; max-width:700px; max-height:88vh; overflow-y:auto; text-align:center;">
                <div class="isekai-tag">⚗️ Alchemist</div>
                <h1 style="color:#dbe7ff; margin:0 0 8px 0;">Tonic and Remedies</h1>
                <p style="color:#9fb3d7; margin:0 0 14px 0;">A place for survival tools, not comfort.</p>

                <div style="display:flex; flex-direction:column; gap:8px; width:100%; max-width:520px; margin:0 auto 18px auto; max-height:48vh; overflow-y:auto; padding-right:4px;">${htmlItems}</div>
                <button id="btn-alchemist-leave" class="rpg-btn" style="background:linear-gradient(180deg,#666,#333);">Return to Town</button>
            </div>
        `;
        document.getElementById("btn-alchemist-leave").onclick = openTownHub;
        goods.forEach((item, idx) => {
            const btn = document.getElementById(`alchemy-buy-${idx}`);
            if (btn) btn.onclick = () => {
                if (hero.gold < item.cost) return;
                hero.gold -= item.cost;
                if (typeof item.effect === 'function') item.effect();
                addLogMsg(`✨ ${item.name} purchased.`, "#8fd1ff");
                openAlchemistView();
            };
        });
    }

    function openLevelUpAllocation(onDone) {

        function draw() {
            view.className = "env-town";

                    <div style="background: rgba(12,24,58,0.58); padding: 12px; border-radius: 14px; border: 1px solid rgba(160,185,255,0.2); text-align:left;">
                        ${["str", "dex", "int", "sta", "cha"].map(s => `
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; font-size:0.95rem;">
                                <span style="text-transform: uppercase; font-weight:bold; color:#bbb;">${s}: <span style="color:#fff;">${hero.stats[s]}</span>${bonus[s]>0 ? ` <span style="color:#2ecc71;">(+${bonus[s]})</span>` : ""}</span>
                                <div style="display:flex; gap:6px;">
                                    <div class="stat-dot" data-stat="${s}" data-dir="minus">-</div>
                                    <div class="stat-dot" data-stat="${s}" data-dir="plus">+</div>
                                </div>
                            </div>
                        `).join("")}
                    </div>
                    <button id="btn-confirm-alloc" class="rpg-btn" style="margin-top:20px; width:100%; background: linear-gradient(180deg, #da3434, #801a1a);" ${pointsLeft>0?'disabled':''}>Confirm Allocation</button>
                </div>
            `;

            document.querySelectorAll(".stat-dot").forEach(dot => {
                dot.onclick = () => {
                    let stat = dot.getAttribute("data-stat"), dir = dot.getAttribute("data-dir");
                    if (dir === "plus" && pointsLeft > 0) { bonus[stat]++; pointsLeft--; }
                    else if (dir === "minus" && bonus[stat] > 0) { bonus[stat]--; pointsLeft++; }
                    draw();
                };
            });

            document.getElementById("btn-confirm-alloc").onclick = () => {
                if (pointsLeft > 0) return;
                let prevInt = hero.stats.int;
                let prevStr = hero.stats.str;
                Object.keys(bonus).forEach(s => hero.stats[s] += bonus[s]);
                hero.maxHp += 8 + Math.floor((hero.stats.sta - 10) / 2);
                if (hero.maxMp > 0) hero.maxMp += 6 + Math.floor((hero.stats.int - 10) / 2);
                refreshDerivedVitals(true);
                hero.hp = hero.maxHp; hero.mp = hero.maxMp; hero.stamina = hero.maxStamina;
                onDone(prevStr, hero.stats.str, prevInt, hero.stats.int);
            };
        }
        draw();
    }

    function processStrMilestones(prevStr, newStr, onComplete) {
        const thresholds = [25, 50, 75, 100];
        let pending = thresholds.filter(t => prevStr < t && newStr >= t && !hero.strMilestonesSeen.includes(t));

        function next() {
            if (pending.length === 0) { onComplete(); return; }
            let t = pending.shift();
            hero.strMilestonesSeen.push(t);
            if (t === 25) {
                showMilestonePopup("💪 Raw Power!", "Your brute strength now boosts all physical damage by 5%!", next);
            } else if (t === 50) {
                showMilestonePopup("💥 Pulverize Unlocked!", "You can now unleash Pulverize — a devastating strike dealing 2x normal damage!", next);
            } else if (t === 75) {
                showMilestonePopup("🛡️ Hardened Body!", "Your physical resilience now reduces incoming damage by 20%!", next);
            } else if (t === 100) {
                showMilestonePopup("🔨 Pulverize Mastered!", "Pulverize now deals 3x normal damage!", next);
            }
        }
        next();
    }

    function processIntMilestones(prevInt, newInt, onComplete) {
        if (hero.classId !== 'mage') { onComplete(); return; }
        const thresholds = [25, 50, 75, 100];
        let pending = thresholds.filter(t => prevInt < t && newInt >= t && !hero.magic.milestonesSeen.includes(t));

        function next() {
            if (pending.length === 0) { onComplete(); return; }
            let t = pending.shift();
            hero.magic.milestonesSeen.push(t);
            if (t === 25) {
                hero.magic.multiMissile = true;
                showMilestonePopup("✨ Arcane Mastery!", "Your Magic Missile now automatically fires a follow-up bolt!", next);
            } else if (t === 50) {
                hero.magic.ignite = true;
                showMilestonePopup("🔥 Arcane Mastery!", "Your Magic Missile combo now finishes with an Ignite burn (3 ticks)!", next);
            } else if (t === 75) {
                showSpellUpgradeChoice(next);
            } else if (t === 100) {
                showCapstoneChoice(next);
            }
        }
        next();
    }
