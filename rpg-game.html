    function enterCombatState() {
        view.className = `env-${currentEnv}`;

        const buildTravelEncounter = () => {
            if (forcedEncounter) {
                enemy = { ...forcedEncounter };
                forcedEncounter = null;
                hero.shieldTurns = 0;
                hero.shieldReduction = 0;
                hero.pulverizeCooldown = 0;
                isEnemyTurn = false;
                renderCombatInterface();
                addLogMsg(`⚔️ Travel encounter! ${enemy.name} blocks the way.`, "#f1c40f");
                return;
            }

            if (currentEnv === "dungeon") {
                if (!dungeonRun) dungeonRun = { stage: 0, cleared: false };
                const base = DUNGEON_STAGES[dungeonRun.stage];
                const stageScale = base.scale || 1;
                enemy = {
                    name: base.name,
                    hp: Math.floor(base.hp * stageScale),
                    maxHp: Math.floor(base.hp * stageScale),
                    sprite: base.sprite,
                    xpReward: Math.floor(base.xp * stageScale),
                    goldReward: Math.floor(base.gold * stageScale),
                    baseDmg: Math.floor(base.dmg * stageScale),
                    dieSides: Math.floor(base.die * stageScale),
                    burn: null,
                    polymorphTurns: 0,
                    origSprite: null,
                    origName: null,
                    isBoss: !!base.boss,
                    skills: base.boss ? ['infernoCrown', 'lavaWave', 'soulRend'] : ['sunder', 'slash'],
                    dungeonStage: dungeonRun.stage + 1,
                    groupSize: 1
                };
                if (base.boss) {
                    enemy.name = `👑 ${base.name}`;
                    enemy.hp = Math.floor(enemy.hp * 1.5);
                    enemy.maxHp = enemy.hp;
                    enemy.baseDmg = Math.floor(enemy.baseDmg * 1.5);
                    enemy.dieSides = Math.floor(enemy.dieSides * 1.2);
                    enemy.xpReward = Math.floor(enemy.xpReward * 1.5);
                    enemy.goldReward = Math.floor(enemy.goldReward * 1.5);
                }
                hero.shieldTurns = 0;
                hero.shieldReduction = 0;
                hero.pulverizeCooldown = 0;
                isEnemyTurn = false;
                registerBestiaryEncounter(enemy, false);
                renderCombatInterface();
                addLogMsg(`🏰 Dungeon depth ${dungeonRun.stage + 1}/4. Clear the chamber to advance.`, "#f1c40f");
                return;
            }

            if (currentEnv === 'arena') {
                if (!arenaRun) arenaRun = { wave: 0, cleared: false };
                const base = ARENA_STAGES[arenaRun.wave];
                const waveScale = base.scale || 1;
                enemy = {
                    name: base.boss ? `👑 ${base.name}` : base.name,
                    hp: Math.floor(base.hp * waveScale),
                    maxHp: Math.floor(base.hp * waveScale),
                    sprite: base.sprite,
                    xpReward: Math.floor(base.xp * waveScale),
                    goldReward: Math.floor(base.gold * waveScale),
                    baseDmg: Math.floor(base.dmg * waveScale),
                    dieSides: Math.floor(base.die * waveScale),
                    burn: null,
                    polymorphTurns: 0,
                    origSprite: null,
                    origName: null,
                    isBoss: !!base.boss,
                    isElite: false,
                    skills: base.boss ? ['command', 'sunder', 'rage'] : [],
                    groupSize: 1,
                    phase: 1,
                    phaseMarks: { 2: false, 3: false, 4: false }
                };
                hero.shieldTurns = 0;
                hero.shieldReduction = 0;
                hero.pulverizeCooldown = 0;
                isEnemyTurn = false;
                registerBestiaryEncounter(enemy, false);
                renderCombatInterface();
                addLogMsg(`⚔️ Arena trial wave ${arenaRun.wave + 1}/3 begins!`, "#f1c40f");
                return;
            }

            let deck = MONSTERS[currentEnv];
            let base = deck[Math.floor(Math.random() * deck.length)];
            const activeQuest = getActiveGuildQuest();
            const questBossChance = activeQuest && activeQuest.env === currentEnv ? activeQuest.bossChance : 0;
            let questBoss = null;
            if (activeQuest && activeQuest.env === currentEnv && activeQuest.targetBoss && Math.random() < questBossChance) {
                questBoss = createQuestBoss(activeQuest.targetBoss, activeQuest);
            }

            let isBoss = false;
            if (!questBoss) {
                isBoss = Math.random() < getBossChanceForEnv(currentEnv);
            }
            const eliteMonster = (!questBoss && !isBoss && Math.random() < getEliteChance(currentEnv))
                ? createEliteMonster(base, currentEnv)
                : null;

            if (questBoss) {
                enemy = questBoss;
            } else if (isBoss) {
                enemy = createGenericBoss(base, currentEnv);
            } else if (eliteMonster) {
                enemy = eliteMonster;
            } else {
                enemy = { ...base };
                enemy.xpReward = base.xp;
                enemy.goldReward = base.gold;
                enemy.baseDmg = base.dmg;
                enemy.dieSides = base.die;
                enemy.maxHp = base.hp;
                enemy.isBoss = false;
                enemy.skills = [];
                enemy.groupSize = 1;
            }
            enemy.burn = null;
            enemy.polymorphTurns = 0;
            enemy.origSprite = null;
            enemy.origName = null;
            hero.shieldTurns = 0;
            hero.shieldReduction = 0;
            hero.pulverizeCooldown = 0;
            isEnemyTurn = false;
            registerBestiaryEncounter(enemy, false);
            renderCombatInterface();
            if (enemy.isBoss) addLogMsg(`👑 BOSS ENCOUNTER! ${enemy.name} stands before you — prepare for a real fight!`, "#f1c40f");
        };

        buildTravelEncounter();
    }

    function renderCombatInterface() {
        view.style.opacity = '1';

        if (enemy && enemy.hp <= 0) {
            setTimeout(() => resolveMatch(true), 0);
            return;
        }

        let plat = getPlatformStyle(currentEnv);

        view.style.opacity = '1';

        let spellListHtml = hero.spells.map(s => {
            let cost = s === "Magic Missile" ? 4 : 8;
            let icon = s === "Magic Missile" ? "✨" : "🔮";
            return `<button class="rpg-btn btn-spell" data-name="${s}" data-cost="${cost}" ${hero.mp < cost || isEnemyTurn?'disabled':''}>${icon} ${s} (${cost}MP)</button>`;
        }).join("");

        let capstoneHtml = "";
        if (hero.magic.capstone === 'shield') {
            capstoneHtml = `<button id="btn-cast-shield" class="rpg-btn" style="background:linear-gradient(180deg,#2980b9,#1c5980);" ${hero.mp<8||isEnemyTurn?'disabled':''}>🛡️ Shield (8MP)</button>`;
        } else if (hero.magic.capstone === 'polymorph') {
            capstoneHtml = `<button id="btn-cast-polymorph" class="rpg-btn" style="background:linear-gradient(180deg,#27ae60,#1a7a41);" ${hero.mp<10||isEnemyTurn?'disabled':''}>🌀 Polymorph (10MP)</button>`;
        }

        let pulverizeHtml = "";
        if (isPulverizeUnlocked()) {
            let onCd = hero.pulverizeCooldown > 0;
            pulverizeHtml = `<button id="btn-combat-pulverize" class="rpg-btn" style="background:linear-gradient(180deg,#c0392b,#7a2015);" ${isEnemyTurn||onCd||hero.stamina < 20?'disabled':''}>🔨 Pulverize${onCd?` (${hero.pulverizeCooldown})`:''}</button>`;
        }

        let hPots = hero.inventory.filter(i => i === "potion_hp").length;
        let mPots = hero.inventory.filter(i => i === "potion_mp").length;
        let dungeonInfoHtml = currentEnv === "dungeon" ? `<div class="rpg-panel" style="padding:10px 14px; margin-bottom:12px; text-align:center; max-width:600px; width:100%; background:rgba(12,24,58,0.72); border-color:rgba(160,185,255,0.2); color:#dbe7ff;">${dungeonRun?.title || 'Dungeon'} Depth: ${dungeonRun ? dungeonRun.stage + 1 : 1}/4</div>` : "";
        let arenaInfoHtml = currentEnv === "arena" ? `<div class="rpg-panel" style="padding:10px 14px; margin-bottom:12px; text-align:center; max-width:600px; width:100%; background:rgba(34,15,58,0.72); border-color:rgba(180,140,255,0.25); color:#dbe7ff;">Arena Trial: ${arenaRun ? arenaRun.wave + 1 : 1}/3</div>` : "";

        view.innerHTML = `
            <div id="battle-arena" style="position:relative; display:flex; justify-content:space-between; width:100%; max-width:650px; margin-bottom:10px; align-items:flex-end; height:180px;">
                <div style="display:flex; flex-direction:column; align-items:center; flex:1;">
                    <div id="p-node-spr" style="transition:transform 0.15s; display:inline-block;">${spriteMarkup(hero.sprite, 92, "hero-combat")}</div>
                    <div style="width:140px; height:18px; background:${plat.bg}; border-radius:50%; border:1px solid ${plat.border}; box-shadow:0 6px 12px rgba(0,0,0,0.5);"></div>
                    <div style="font-size:0.9rem; font-weight:bold; margin-top:5px; text-shadow:0 2px 2px #000;">You</div>
                    <div style="width:110px; font-size:0.75rem;">
                        HP: ${hero.hp}/${hero.maxHp}
                        <div class="glow-bar-bg"><div class="glow-bar-fill" style="width:${(hero.hp/hero.maxHp)*100}%; background:linear-gradient(90deg, #e53935, #ff7373);"></div></div>
                        ${hero.maxMp > 0 ? `MP: ${hero.mp}/${hero.maxMp} <div class="glow-bar-bg"><div class="glow-bar-fill" style="width:${(hero.mp/hero.maxMp)*100}%; background:linear-gradient(90deg, #1e88e5, #64b5f6);"></div></div>` : ""}
                        ${hero.shieldTurns > 0 ? `<div style="color:#3498db; margin-top:2px;">🛡️ Shielded (${hero.shieldTurns})</div>` : ""}
                    </div>
                </div>

                <div style="display:flex; flex-direction:column; align-items:center; flex:1;">
                    <div id="e-node-spr" class="${enemy.isBoss ? 'boss-sprite' : ''}" style="transition:transform 0.15s; display:inline-block;">${renderEnemyCombatHtml()}</div>
                    <div class="${enemy.isBoss ? 'boss-platform' : ''}" style="width:140px; height:18px; background:${plat.bg}; border-radius:50%; border:1px solid ${plat.border}; box-shadow:0 6px 12px rgba(0,0,0,0.5);"></div>
                    <div style="font-size:0.9rem; font-weight:bold; margin-top:5px; text-shadow:0 2px 2px #000; color:${enemy.isBoss ? '#f1c40f' : enemy.isElite ? '#8fd1ff' : '#ef5350'};">${enemy.name}</div>
                    ${enemy.questBossId ? `<div style="font-size:0.75rem; color:#8fd1ff; margin-top:2px;">Guild Contract Boss</div>` : ""}
                    ${enemy.isElite ? `<div style="font-size:0.75rem; color:#8fd1ff; margin-top:2px;">Elite Monster</div>` : ""}
                    ${enemy.groupSize ? `<div style="font-size:0.75rem; color:#f1c40f; margin-top:2px;">Group Size: ${enemy.groupSize}</div>` : ""}
                    <div style="width:110px; font-size:0.75rem;">
                        HP: ${enemy.hp}/${enemy.maxHp}
                        <div class="glow-bar-bg"><div class="glow-bar-fill" style="width:${(enemy.hp/enemy.maxHp)*100}%; background:linear-gradient(90deg, #e53935, #ff7373);"></div></div>
                        ${enemy.burn ? `<div style="color:#e67e22; margin-top:2px;">🔥 Burning (${enemy.burn.ticksLeft})</div>` : ""}
                    </div>
                </div>
            </div>

            ${dungeonInfoHtml}${arenaInfoHtml}${arenaInfoHtml}${arenaInfoHtml}

            <div id="c-log-box" class="rpg-panel" style="width:100%; max-width:600px; height:110px; padding:10px; overflow-y:auto; box-sizing:border-box; font-family:monospace; font-size:0.8rem; line-height:1.4; margin-bottom:15px; background:rgba(12,24,58,0.72);">
                <div style="color:#f1c40f;">⚔️ Clash started! Area environment: ${currentEnv.toUpperCase()}</div>
            </div>

            <div id="combat-interface" class="rpg-panel" style="padding:15px; display:flex; flex-direction:column; gap:10px; width:100%; max-width:600px; background:linear-gradient(180deg, rgba(10, 22, 52, 0.9), rgba(5, 10, 28, 0.84));">
                <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
                    <button id="btn-combat-atk" class="rpg-btn" style="background:linear-gradient(180deg, #c0392b, #962d22);" ${isEnemyTurn?'disabled':''}>${getAttackLabel()}</button>
                    ${pulverizeHtml}
                    ${spellListHtml}
                    ${capstoneHtml}
                </div>
                <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
                    <button id="btn-pot-hp" class="rpg-btn" style="background:linear-gradient(180deg, #27ae60, #1e7e43);" ${hPots===0||isEnemyTurn?'disabled':''}>Heal Pot (${hPots})</button>
                    <button id="btn-pot-mp" class="rpg-btn" style="background:linear-gradient(180deg, #2980b9, #1f618d);" ${mPots===0||isEnemyTurn?'disabled':''}>Mana Pot (${mPots})</button>
                    <button id="btn-combat-flee" class="rpg-btn" style="background:linear-gradient(180deg, #666, #333);" ${isEnemyTurn || currentEnv === "dungeon" ? 'disabled' : ''}>🏃 Flee</button>
                </div>
            </div>
        `;

        document.getElementById("btn-combat-atk").onclick = executePhysicalStrike;
        document.getElementById("btn-pot-hp").onclick = () => usePotionItem("potion_hp");
        document.getElementById("btn-pot-mp").onclick = () => usePotionItem("potion_mp");
        document.getElementById("btn-combat-flee").onclick = attemptFlee;
        if (document.getElementById("btn-combat-pulverize")) document.getElementById("btn-combat-pulverize").onclick = executePulverize;
        document.querySelectorAll(".btn-spell").forEach(b => {
            b.onclick = () => executeSpellProcedure(b.getAttribute("data-name"), parseInt(b.getAttribute("data-cost")));
        });
        if (document.getElementById("btn-cast-shield")) document.getElementById("btn-cast-shield").onclick = castShield;
        if (document.getElementById("btn-cast-polymorph")) document.getElementById("btn-cast-polymorph").onclick = castPolymorph;
    }

    function addLogMsg(txt, color = "#fff") {
        let b = document.getElementById("c-log-box");
        if(!b) return;
        let d = document.createElement("div"); d.style.color = color; d.style.marginBottom = "3px"; d.innerText = txt;
        b.appendChild(d); b.scrollTop = b.scrollHeight;
    }

    function usePotionItem(id) {
        hero.inventory.splice(hero.inventory.indexOf(id), 1);
        if(id === "potion_hp") {
            hero.hp = Math.min(hero.maxHp, hero.hp + 20);
            addLogMsg(`💖 Drank Health Potion! Restored 20 HP.`, "#2ecc71");
        } else {
            hero.mp = Math.min(hero.maxMp, hero.mp + 15);
            addLogMsg(`🧪 Drank Mana Potion! Restored 15 MP.`, "#3498db");
        }
        renderCombatInterface();
        executeRetaliationPass();
    }

    function executePhysicalStrike() {
        const pNode = document.getElementById("p-node-spr"), eNode = document.getElementById("e-node-spr");
        pNode.classList.add("anim-p-strike");

        setTimeout(() => {
            let strMod = Math.floor((hero.stats.str - 10) / 2);
            let dieSides = (CLASSES[hero.classId] && CLASSES[hero.classId].dieSides) || 6;
            let weaponBonus = getPhysicalWeaponBonus();
            let rawDmg = Math.floor(Math.random() * dieSides) + 1 + strMod + weaponBonus;

            let isCrit = Math.random() * 100 < getCritChance();
            if(isCrit) { rawDmg = Math.floor(rawDmg * getCritMultiplier()); }

            rawDmg = Math.floor(rawDmg * getStrDmgBonusMultiplier() * getRuneOffenseMultiplier());

            applyDamageToEnemy(rawDmg);
            maybeTriggerEnemyPhases();
            renderCombatInterface();
            shakeEnemy();
            addLogMsg(`⚔️ You hit ${enemy.name} for ${rawDmg} physical damage${isCrit?' [CRITICAL]!':'.'}`, isCrit?'#f1c40f':'#2ecc71');

            setTimeout(() => {
                if(enemy.hp <= 0) resolveMatch(true);
                else executeRetaliationPass();
            }, 250);
        }, 150);
    }

    function executePulverize() {
        if (hero.pulverizeCooldown > 0 || isEnemyTurn || hero.stamina < 20) return;
        hero.stamina = Math.max(0, hero.stamina - 20);
        const pNode = document.getElementById("p-node-spr");
        pNode.classList.add("anim-p-strike");

        setTimeout(() => {
            let strMod = Math.floor((hero.stats.str - 10) / 2);
            let dieSides = (CLASSES[hero.classId] && CLASSES[hero.classId].dieSides) || 6;
            let weaponBonus = getPhysicalWeaponBonus();
            let base = Math.floor(Math.random() * dieSides) + 1 + strMod + weaponBonus;
            base = Math.floor(base * getStrDmgBonusMultiplier());
            let mult = getPulverizeMultiplier();
            let dmg = Math.floor(base * mult * getRuneOffenseMultiplier());

            applyDamageToEnemy(dmg);
            maybeTriggerEnemyPhases();
            hero.pulverizeCooldown = 3;
            renderCombatInterface();
            shakeEnemy();
            addLogMsg(`🔨 PULVERIZE! You crush ${enemy.name} for ${dmg} damage (x${mult})!`, "#e67e22");

            setTimeout(() => {
                if(enemy.hp <= 0) resolveMatch(true);
                else executeRetaliationPass();
            }, 250);
        }, 150);
    }

    function attemptFlee() {
        if (isEnemyTurn) return;
        if (currentEnv === "dungeon") {
            addLogMsg("🏰 The dungeon seals the exits. You must clear all four chambers.", "#e67e22");
            return;
        }
        let chance = Math.min(90, 30 + (hero.stats.dex - 10) * 2);
        let roll = Math.random() * 100;

        if (roll < chance) {
            addLogMsg(`🏃 You successfully flee the encounter! (${Math.floor(chance)}% chance)`, "#2ecc71");
            const ctrl = document.getElementById("combat-interface");
            if (ctrl) {
                ctrl.innerHTML = `<button id="btn-flee-leave" class="rpg-btn" style="margin:0 auto; display:block; background:#555;">Return to Town</button>`;
                document.getElementById("btn-flee-leave").onclick = openTownHub;
            }
        } else {
            addLogMsg(`🏃 Failed to escape! (${Math.floor(chance)}% chance)`, "#e74c3c");
            executeRetaliationPass();
        }
    }

    function executeSpellProcedure(name, cost) {
        if (name === "Magic Missile") { executeMagicMissileCombo(cost); return; }

        // Generic (Fireball etc.)
        hero.mp -= cost;
        const intMod = Math.floor((hero.stats.int - 10) / 2);
        const magicMult = getMagicDamageMultiplier();

        launchProjectile('fireball', () => {
            let dmg = Math.floor((Math.floor(Math.random()*10) + Math.floor(Math.random()*10) + 6 + (intMod*1.5) + getMagicWeaponBonus()) * magicMult * getRuneOffenseMultiplier());
            applyDamageToEnemy(dmg);
            maybeTriggerEnemyPhases();
            renderCombatInterface();
            shakeEnemy();
            addLogMsg(`🔮 Cast ${name}! Hit ${enemy.name} for ${dmg} magical spell damage.`, "#9b59b6");
            setTimeout(() => {
                if(enemy.hp <= 0) resolveMatch(true);
                else executeRetaliationPass();
            }, 250);
        });
    }

    function executeMagicMissileCombo(cost) {
        hero.mp -= cost;
        const intMod = Math.floor((hero.stats.int - 10) / 2);
        const magicMult = getMagicDamageMultiplier();
        const missileMult = 1 + (hero.magic.upgradeChoice === 'missile' ? 0.5 : 0);
        const igniteMult = 1 + (hero.magic.upgradeChoice === 'ignite' ? 0.5 : 0);

        function fireBolt(isFollowup, then) {
            launchProjectile('missile', () => {
                let base = Math.floor(Math.random()*6) + 4 + intMod + getMagicWeaponBonus();
                let dmg = Math.floor(base * (isFollowup ? 0.6 : 1) * missileMult * magicMult * getRuneOffenseMultiplier());
                applyDamageToEnemy(dmg);
                maybeTriggerEnemyPhases();
                renderCombatInterface();
                shakeEnemy();
                addLogMsg(`✨ Magic Missile${isFollowup?' (follow-up)':''} hits ${enemy.name} for ${dmg} magic damage.`, "#9b59b6");
                setTimeout(then, 250);
            });
        }

        fireBolt(false, () => {
            if (enemy.hp <= 0) { resolveMatch(true); return; }
            if (hero.magic.multiMissile) {
                fireBolt(true, () => {
                    if (enemy.hp <= 0) { resolveMatch(true); return; }
                    if (hero.magic.ignite) {
                        let tickDmg = Math.max(1, Math.floor((2 + intMod*0.5) * igniteMult * magicMult));
                        enemy.burn = { ticksLeft: 3, dmgPerTick: tickDmg };
                        renderCombatInterface();
                        addLogMsg(`🔥 ${enemy.name} is set ablaze! (${tickDmg} dmg x3 turns)`, "#e67e22");
                    }
                    executeRetaliationPass();
                });
            } else {
                executeRetaliationPass();
            }
        });
    }

    function castShield() {
        if (hero.mp < 8 || isEnemyTurn) return;
        hero.mp -= 8;
        launchProjectile('shield', () => {
            hero.shieldTurns = 4;
            hero.shieldReduction = 0.25;
            addLogMsg(`🛡️ You conjure a shield! Incoming damage reduced 25% for 4 turns.`, "#3498db");
            renderCombatInterface();
            executeRetaliationPass();
        });
    }

    function castPolymorph() {
        if (hero.mp < 10 || isEnemyTurn) return;
        hero.mp -= 10;
        launchProjectile('polymorph', () => {
            if (!enemy.origSprite) { enemy.origSprite = enemy.sprite; enemy.origName = enemy.name; }
            enemy.sprite = "🐇";
            enemy.name = `${enemy.origName} (Polymorphed)`;
            enemy.polymorphTurns = 3;
            addLogMsg(`🌀 ${enemy.origName} has been turned into a harmless rabbit for 3 turns!`, "#27ae60");
            renderCombatInterface();
            executeRetaliationPass();
        });
    }

    function executeRetaliationPass() {
        if(enemy.hp <= 0 || hero.hp <= 0) return;

        if (hero.burnTurns > 0) {
            const burnDmg = hero.burnDamage || 0;
            if (burnDmg > 0) {
                hero.hp = Math.max(0, hero.hp - burnDmg);
                hero.burnTurns--;
                addLogMsg(`🔥 Fire burns you for ${burnDmg} damage. (${hero.burnTurns} left)`, "#e67e22");
                if (hero.hp <= 0) { renderCombatInterface(); setTimeout(() => resolveMatch(false), 250); return; }
            }
        }

        if (enemy.burn && enemy.burn.ticksLeft > 0) {
            let d = enemy.burn.dmgPerTick;
            applyDamageToEnemy(d);
            enemy.burn.ticksLeft--;
            addLogMsg(`🔥 Burn sears ${enemy.origName || enemy.name} for ${d} damage. (${enemy.burn.ticksLeft} left)`, "#e67e22");
            if (enemy.burn.ticksLeft <= 0) enemy.burn = null;
            renderCombatInterface();
            if (enemy.hp <= 0) { setTimeout(() => resolveMatch(true), 300); return; }
        }

        if (isGroupEncounter()) {
            isEnemyTurn = true;
            renderCombatInterface();
            setTimeout(() => {
                const members = enemy.groupMembers.filter(m => m.hp > 0);
                let totalDamage = 0;
                const attackNext = (idx) => {
                    if (idx >= members.length) {
                        if (hero.pulverizeCooldown > 0) hero.pulverizeCooldown--;
                        if (hero.shieldTurns > 0) hero.shieldTurns--;
                        hero.hp = Math.max(0, hero.hp - totalDamage);
                        if (!hero.injury && totalDamage >= Math.max(14, Math.floor(hero.maxHp * 0.22))) {
                            const injuryChance = Math.max(0.03, 0.10 - getLuckRareChanceBonus() * 0.5);
                            if (Math.random() < injuryChance) applyInjury();
                        }
                        renderCombatInterface();
                        addLogMsg(`👥 The group lands ${members.length} separate strikes for ${totalDamage} total damage.`, '#e74c3c');
                        setTimeout(() => {
                            if(hero.hp <= 0) resolveMatch(false);
                            else { isEnemyTurn = false; renderCombatInterface(); }
                        }, 250);
                        return;
                    }
                    const member = members[idx];
                    const hit = Math.floor(Math.random() * member.dieSides) + 1 + member.baseDmg;
                    const mitigation = Math.floor((hero.stats.dex - 10) / 4);
                    let finalOut = Math.max(1, hit - mitigation);
                    if (getArmorDamageReductionFlat() > 0) finalOut = Math.max(1, finalOut - getArmorDamageReductionFlat());
                    finalOut = Math.max(1, Math.floor(finalOut * (1 - getArmorDamageReductionPercent())));
                    if (getStrDamageReduction() > 0) finalOut = Math.floor(finalOut * (1 - getStrDamageReduction()));
                    if (getRuneDefenseReduction() > 0) finalOut = Math.floor(finalOut * (1 - getRuneDefenseReduction()));
                    if (hero.shieldTurns > 0) {
                        finalOut = Math.floor(finalOut * (1 - hero.shieldReduction));
                    }
                    totalDamage += Math.max(0, finalOut);
                    addLogMsg(`👥 ${member.name} strikes for ${finalOut} damage.`, '#e74c3c');
                    setTimeout(() => attackNext(idx + 1), 120);
                };
                attackNext(0);
            }, 400);
            return;
        }

        isEnemyTurn = true;
        renderCombatInterface();

        setTimeout(() => {
            const eNode = document.getElementById("e-node-spr"), pNode = document.getElementById("p-node-spr");
            if(eNode) eNode.classList.add("anim-e-strike");

            setTimeout(() => {
                let polymorphed = enemy.polymorphTurns > 0;
                let rolled = Math.floor(Math.random() * enemy.dieSides) + 1 + enemy.baseDmg;
                if (polymorphed) rolled = Math.max(1, Math.floor(rolled * 0.1));

                let mitigation = Math.floor((hero.stats.dex - 10) / 4);
                let finalOut = Math.max(polymorphed ? 0 : 1, rolled - mitigation);

                if ((enemy.isBoss || enemy.isElite) && Array.isArray(enemy.skills) && enemy.skills.length > 0 && Math.random() < (enemy.isBoss ? 0.68 : 0.42)) {
                    const skill = enemy.skills[Math.floor(Math.random() * enemy.skills.length)];
                    let extra = 0;
                    let bossMsg = createBossSkillLog(skill);
                    switch (skill) {
                        case 'drain':
                            extra = 3 + Math.floor(enemy.baseDmg * 0.45);
                            enemy.hp = Math.min(enemy.maxHp, enemy.hp + Math.floor(extra * 0.5));
                            bossMsg = `channels a life drain and siphons your strength`;
                            break;
                        case 'curse':
                            extra = 4;
                            hero.mp = Math.max(0, hero.mp - 3);
                            bossMsg = `casts a curse that tears at your resolve`;
                            break;
                        case 'sunder':
                            extra = 6;
                            bossMsg = `smashes through your guard with a crushing blow`;
                            break;
                        case 'command':
                            extra = 4;
                            bossMsg = `roars a battlefield command and presses the attack`;
                            break;
                        case 'ambush':
                            extra = 5;
                            bossMsg = `repositions in a blur and strikes from the side`;
                            break;
                        case 'magmaBurst':
                            extra = 8;
                            hero.burnTurns = 2;
                            hero.burnDamage = Math.max(hero.burnDamage || 0, 4);
                            bossMsg = `erupts in a magma burst and sets you ablaze`;
                            break;
                        case 'emberNova':
                            extra = 7;
                            hero.burnTurns = 2;
                            hero.burnDamage = Math.max(hero.burnDamage || 0, 3);
                            bossMsg = `unleashes an ember nova across the arena`;
                            break;
                        case 'lavaWave':
                            extra = 9;
                            hero.burnTurns = 3;
                            hero.burnDamage = Math.max(hero.burnDamage || 0, 4);
                            bossMsg = `sends a lava wave crashing over you`;
                            break;
                        case 'quake':
                            extra = 8;
                            bossMsg = `shakes the ground with a volcanic quake`;
                            break;
                        case 'infernoCrown':
                            extra = 12;
                            hero.burnTurns = 3;
                            hero.burnDamage = Math.max(hero.burnDamage || 0, 5);
                            bossMsg = `calls down an inferno crown of fire`;
                            break;
                        case 'soulRend':
                            extra = 10;
                            hero.mp = Math.max(0, hero.mp - 5);
                            bossMsg = `rips at your spirit with a dark spell`;
                            break;
                        default:
                            extra = 4;
                    }
                    finalOut += extra;
                    addLogMsg(`👑 ${enemy.name} ${bossMsg}!`, "#f39c12");
                }

                if (getArmorDamageReductionFlat() > 0) {
                    finalOut = Math.max(1, finalOut - getArmorDamageReductionFlat());
                }
                finalOut = Math.max(1, Math.floor(finalOut * (1 - getArmorDamageReductionPercent())));

                if (getStrDamageReduction() > 0) {
                    finalOut = Math.floor(finalOut * (1 - getStrDamageReduction()));
                }
                if (getRuneDefenseReduction() > 0) {
                    finalOut = Math.floor(finalOut * (1 - getRuneDefenseReduction()));
                }

                let shieldedNote = "";
                if (hero.shieldTurns > 0) {
                    finalOut = Math.floor(finalOut * (1 - hero.shieldReduction));
                    hero.shieldTurns--;
                    shieldedNote = " (Shielded)";
                }

                hero.hp = Math.max(0, hero.hp - finalOut);
                if (!hero.injury && finalOut >= Math.max(12, Math.floor(hero.maxHp * 0.18))) {
                    const injuryChance = Math.max(0.03, 0.12 - getLuckRareChanceBonus() * 0.5);
                    if (Math.random() < injuryChance) applyInjury();
                }

                if (hero.pulverizeCooldown > 0) hero.pulverizeCooldown--;

                if (enemy.polymorphTurns > 0) {
                    enemy.polymorphTurns--;
                    if (enemy.polymorphTurns === 0 && enemy.origSprite) {
                        enemy.sprite = enemy.origSprite; enemy.name = enemy.origName;
                        enemy.origSprite = null; enemy.origName = null;
                        addLogMsg(`✨ The polymorph wears off. ${enemy.name} returns to normal!`, "#95a5a6");
                    }
                }

                renderCombatInterface();
                if(pNode) pNode.classList.add("anim-shake");
                addLogMsg(`👹 ${enemy.name} attacks back, dealing ${finalOut} damage${polymorphed?' (weakened by Polymorph)':''}${shieldedNote}.`, "#e74c3c");

                setTimeout(() => {
                    const regen = getRuneManaRegenAmount();
                    if (regen > 0 && hero.mp < hero.maxMp) {
                        const beforeMp = hero.mp;
                        hero.mp = Math.min(hero.maxMp, hero.mp + regen);
                        if (hero.mp > beforeMp) {
                            addLogMsg(`✨ Rune of Flow restores ${hero.mp - beforeMp} MP.`, "#9b59b6");
                        }
                    }
                    if(hero.hp <= 0) resolveMatch(false);
                    else { isEnemyTurn = false; renderCombatInterface(); }
                }, 250);
            }, 150);
        }, 600);
    }

    function resolveMatch(won) {
        if (won && enemy && enemy.hp > 0) return;

        const ctrl = document.getElementById("combat-interface");
        if(!ctrl) return;

        if(won) {
            registerBestiaryEncounter(enemy, true);
            const xpGain = Math.floor(enemy.xpReward * getExpBonusMultiplier());
            const goldGain = Math.floor(enemy.goldReward * getGoldRewardMultiplier());
            hero.xp += xpGain;
            hero.gold += goldGain;
            addLogMsg(`
🏆 Enemy Defeated! Collected ${xpGain} XP and 🪙${goldGain} Gold.`, "#f1c40f");
            consumeTempGoldBoost();

            if (completeActiveGuildQuest(enemy)) {
                const quest = getGuildQuestById(enemy.questBossId || '');
                if (quest) {
                    addLogMsg(`📜 Contract reward claimed from ${quest.title}.`, '#8fd1ff');
                }
            }

            let leveledUp = false;
            if(hero.xp >= hero.nextXp) {
                hero.level++;
                hero.xp -= hero.nextXp;
                hero.nextXp = Math.floor(hero.nextXp * 1.6);
                leveledUp = true;
                addLogMsg(`✨ LEVEL UP! You reached Level ${hero.level}! Allocate your new stat points.`, "#3498db");
            }

            const afterStats = (nextAction) => {
                if (leveledUp) {
                    openLevelUpAllocation((prevStr, newStr, prevInt, newInt) => {
                        processStrMilestones(prevStr, newStr, () => {
                            processIntMilestones(prevInt, newInt, nextAction);
                        });
                    });
                } else {
                    nextAction();
                }
            };

            if (enemy.travelArrival) {
                const resume = enemy.travelArrival;
                enemy.travelArrival = null;
                afterStats(resume);
                return;
            }

            if (currentEnv === "dungeon" && dungeonRun) {
                if (dungeonRun.stage < DUNGEON_STAGES.length - 1) {
                    afterStats(showDungeonAdvanceChoice);
                } else {
                    afterStats(openDungeonChest);
                }
                return;
            }

            if (currentEnv === "arena" && arenaRun) {
                if (arenaRun.wave < ARENA_STAGES.length - 1) {
                    afterStats(showArenaAdvanceChoice);
                } else {
                    afterStats(openArenaRewardChest);
                }
                return;
            }

            afterStats(showFieldContinueChoice);
        } else {
            addLogMsg(`
💀 Slain in Battle! Your journey ends on level ${hero.level}.`, "#da3434");
            ctrl.innerHTML = `<button id="btn-battle-dead" class="rpg-btn" style="margin:0 auto; display:block; background:#e74c3c;">Create New Character</button>`;
            document.getElementById("btn-battle-dead").onclick = openCharacterCreation;
        }
    }

    // Launch execution pipeline mapping configuration entry point
    openCharacterCreation();
})();
</script>
